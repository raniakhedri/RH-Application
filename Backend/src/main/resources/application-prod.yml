server:
  port: ${PORT:8080}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:karimarouchi123@gmail.com}
    from-name: Antigone RH
    enabled: true
    brevo-api-key: ${BREVO_API_KEY:}
  upload:
    dir: uploads/justificatifs

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailAutoConfiguration

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
