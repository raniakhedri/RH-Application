server:
  port: ${PORT:8080}

app:
  # CORS allowed origins — set FRONTEND_URL on Render; locally falls back to both Vite ports
  frontend-url: ${FRONTEND_URL:${FRONTEND_BASE_URL:http://localhost:3000,http://localhost:5173}}
  mail:
    from: ${MAIL_USERNAME:yosr.khriji27@gmail.com}
    enabled: true
  upload:
    dir: uploads/justificatifs

spring:
  datasource:
    # DATABASE_URL on Render must be in JDBC format:
    #   jdbc:postgresql://host:5432/dbname
    # (add the jdbc: prefix to the postgresql:// URL Render gives you)
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/antigone_rh}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME:yosr.khriji27@gmail.com}
    # BREVO_API_KEY is the SMTP key from your Brevo account
    password: ${BREVO_API_KEY:fbgodopejvihkutw}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
